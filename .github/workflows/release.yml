# Per-release process: full umbrella draw-in at the exact rev, then fresh tag + GitHub Release.
# Source-only (no crates.io). Never overwrites tags. Self-hosted fleet only.
name: release (draw-in + tag + GitHub Release)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name to create (fresh only — existing tag refuses)"
        required: true
        default: "v0.464.0"
      rev:
        description: "Full 40-char commit SHA to validate and tag"
        required: true
      mode:
        description: "Draw-in depth before cut"
        type: choice
        options: [check+test, check, test]
        default: check+test
      notes:
        description: "Release notes body (markdown)"
        required: false
        default: "Umbrella release. Full pin draw-in green at this rev."

permissions:
  contents: write

concurrency:
  group: release-umbrella
  cancel-in-progress: false

jobs:
  draw-in:
    name: pre-release full draw-in
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 180
    steps:
      - name: Validate rev shape
        env:
          REV: ${{ inputs.rev }}
        run: |
          set -euo pipefail
          case "$REV" in
            *[!0-9a-f]*|"") echo "::error::rev must be full lowercase 40-hex SHA"; exit 1;;
          esac
          test "${#REV}" -eq 40

      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.rev }}
          persist-credentials: false

      - name: Lock format at release rev
        run: |
          set -euo pipefail
          rust_pins=$(grep -cE '^[a-z0-9-]+=[0-9a-f]{40} tree=[0-9a-f]{40}$' components.lock || true)
          myc_pins=$(grep -cE '^[a-z0-9-]+-myc=[0-9a-f]{40}$' components.lock || true)
          echo "rust_pins=$rust_pins myc_pins=$myc_pins"
          test "$rust_pins" -eq 45
          test "$myc_pins" -eq 0

      - name: Full pin draw-in (user install simulation)
        env:
          MODE: ${{ inputs.mode }}
          FAIL_FAST: "1"
          WORKDIR: ${{ runner.temp }}/mycelium-drawin-release
        run: bash scripts/umbrella-draw-in.sh

  release:
    name: tag + GitHub Release
    needs: draw-in
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - name: Refuse if tag already exists (fresh-tags-only)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/git/ref/tags/${{ inputs.tag }}")
          if [ "$code" = "200" ]; then
            echo "::error::tag ${{ inputs.tag }} already exists — never overwrite"
            exit 1
          fi

      - name: Verify rev exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          code=$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/commits/${{ inputs.rev }}")
          test "$code" = "200" || { echo "::error::rev not found (HTTP $code)"; exit 1; }

      - name: Create Release (tag at pinned rev + source archives)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTES: ${{ inputs.notes }}
        run: |
          set -euo pipefail
          body=$(printf '%s' "${NOTES}" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
          code=$(curl -sS -o /tmp/release-resp.json -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases" \
            -d "{\"tag_name\":\"${{ inputs.tag }}\",\"target_commitish\":\"${{ inputs.rev }}\",\"name\":\"${{ inputs.tag }}\",\"body\":${body},\"draft\":false,\"prerelease\":false}")
          if [ "$code" != "201" ]; then
            echo "::error::release creation failed (HTTP $code)"; cat /tmp/release-resp.json; exit 1
          fi
          echo "Release created:"
          python3 -c 'import json; print(json.load(open("/tmp/release-resp.json"))["html_url"])'
