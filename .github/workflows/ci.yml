name: ci
on:
  workflow_dispatch:
  push:
    branches: [main]
jobs:
  pins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show component pins
        run: cat components.lock
      - name: Verify pin format
        run: grep -E '^[a-z0-9-]+=[0-9a-f]{40}$' components.lock | head
