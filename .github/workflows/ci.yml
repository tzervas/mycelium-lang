name: ci
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  integration:
    # Umbrella integration validation (steer handoff §6.2-4): resolve every Rust component pin
    # and type-check the apex repos — cargo pulls and checks the full pinned dependency graph
    # transitively, so a green run validates that ALL Rust pins resolve and compose. (*-myc pins
    # are format/existence-checked only; their content validation is the Phase-E/F program.)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.96.1
      - name: Verify lock format
        run: |
          set -eu
          rust_pins=$(grep -cE '^[a-z0-9-]+=[0-9a-f]{40} tree=[0-9a-f]{40}$' components.lock)
          myc_pins=$(grep -cE '^[a-z0-9-]+-myc=[0-9a-f]{40}$' components.lock)
          echo "rust_pins=$rust_pins myc_pins=$myc_pins"
          test "$rust_pins" -eq 45
          test "$myc_pins" -eq 46
      - name: Integration-check apex components (pulls the whole pinned Rust graph)
        run: |
          set -eu
          mkdir -p _it
          for apex in mycelium-std-conformance mycelium-cli mycelium-lint mycelium-check mycelium-bench mycelium-fmt mycelium-doc mycelium-sec mycelium-build mycelium-transpile mycelium-std-sys-host mycelium-std-fmt mycelium-std-math mycelium-std-spore mycelium-std-cmp mycelium-std-collections mycelium-std-dense mycelium-std-fs mycelium-std-io mycelium-std-iter mycelium-std-rand mycelium-std-text mycelium-std-error; do
            rev=$(grep -E "^${apex}=" components.lock | sed -E 's/^[a-z0-9-]+=([0-9a-f]{40}).*/\1/')
            test -n "$rev"
            git clone -q "https://github.com/tzervas/${apex}" "_it/${apex}"
            git -C "_it/${apex}" checkout -q "$rev"
            (cd "_it/${apex}" && cargo check -q)
            echo "OK ${apex}@${rev}"
          done
