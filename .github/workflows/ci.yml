name: ci

# Product gate: lock format + progressive multi-OS/arch pin draw-in.
# See docs/SUPPORT_MATRIX.md and .github/draw-in-matrix.json
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Gate depth"
        type: choice
        options: [check, check+test, test]
        default: check+test
      pin_limit:
        description: "Optional pin limit for smoke (empty = all)"
        required: false
        default: ""
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 0"

concurrency:
  group: ci-umbrella-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lock-format:
    name: components.lock format (Rust train)
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Verify lock format
        run: |
          set -euo pipefail
          rust_pins=$(grep -cE '^[a-z0-9-]+=[0-9a-f]{40} tree=[0-9a-f]{40}$' components.lock || true)
          myc_pins=$(grep -cE '^[a-z0-9-]+-myc=[0-9a-f]{40}$' components.lock || true)
          echo "rust_pins=$rust_pins myc_pins=$myc_pins"
          test "$rust_pins" -eq 45
          test "$myc_pins" -eq 0
      - name: Show support matrix (required vs experimental)
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          m=json.loads(Path(".github/draw-in-matrix.json").read_text())
          for s in ("required","experimental","planned"):
            ids=[t["id"] for t in m["targets"] if t["status"]==s]
            print(f"{s} ({len(ids)}): {', '.join(ids)}")
          PY

  # ----- Required draw-in cells (block merge/release gate) -----
  draw-in-required:
    name: draw-in ${{ matrix.id }}
    needs: lock-format
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64-host
            runs_on: [self-hosted, linux, x64, podman]
            mode: native
          # The per-distro cells (ubuntu/debian/rocky) previously lived here in `container`
          # mode via scripts/draw-in-container.sh, which spins up a NESTED podman/docker
          # container. The fleet runners are themselves podman-spawned containers with no
          # in-container engine (by design — the fleet manager, tzervas/gha-runner-ctl, spins
          # runners up VIA podman), so nested draw-in can never run there ("need podman or
          # docker") — a misimplementation, not a provisioning gap. They are demoted to the
          # experimental (non-blocking) job below until the fleet registers distro-image
          # runners so per-distro draw-in runs NATIVELY (no nesting). The native
          # linux-x64-host cell above is the honest required Linux gate. See
          # tzervas/gha-runner-ctl and docs/SUPPORT_MATRIX.md.
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Resolve MODE / PIN_LIMIT
        id: cfg
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "pin_limit=${{ inputs.pin_limit }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "mode=check" >> "$GITHUB_OUTPUT"
            echo "pin_limit=" >> "$GITHUB_OUTPUT"
          else
            echo "mode=check+test" >> "$GITHUB_OUTPUT"
            echo "pin_limit=" >> "$GITHUB_OUTPUT"
          fi
      - name: Native host draw-in (all component repos)
        if: matrix.mode == 'native'
        env:
          MODE: ${{ steps.cfg.outputs.mode }}
          PIN_LIMIT: ${{ steps.cfg.outputs.pin_limit }}
          DRAW_IN_OS: linux-host
          DRAW_IN_ARCH: x64
          WORKDIR: ${{ runner.temp }}/drawin-${{ matrix.id }}
          REPORT_JSONL: ${{ runner.temp }}/component-report-${{ matrix.id }}.jsonl
        run: bash scripts/umbrella-draw-in.sh
      - name: Upload per-component report
        if: matrix.mode == 'native' && always()
        uses: actions/upload-artifact@v4
        with:
          name: component-draw-in-${{ matrix.id }}
          path: ${{ runner.temp }}/component-report-${{ matrix.id }}.jsonl
          if-no-files-found: ignore
      - name: Container distro draw-in
        if: matrix.mode == 'container'
        env:
          MODE: ${{ steps.cfg.outputs.mode }}
          PIN_LIMIT: ${{ steps.cfg.outputs.pin_limit }}
          IMAGE: ${{ matrix.image }}
          PLATFORM: ${{ matrix.platform || '' }}
          RUST_PREINSTALLED: ${{ matrix.rust_preinstalled || '0' }}
          DRAW_IN_OS: ${{ matrix.draw_os }}
          DRAW_IN_ARCH: ${{ matrix.draw_arch }}
        run: bash scripts/draw-in-container.sh

  # ----- Experimental cells (do not block; progressive expansion) -----
  draw-in-experimental:
    name: experimental ${{ matrix.id }}
    needs: lock-format
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 180
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: fedora-x64
            runs_on: [self-hosted, linux, x64, podman]
            mode: container
            image: docker.io/library/fedora:40
            draw_os: fedora
            draw_arch: x64
          - id: linux-arm64-emu
            runs_on: [self-hosted, linux, x64, podman]
            mode: container
            image: docker.io/library/rust:1.85-bookworm
            platform: linux/arm64
            rust_preinstalled: "1"
            draw_os: debian-bookworm
            draw_arch: arm64
          # Per-distro Linux cells: demoted from required (see draw-in-required note).
          # Still `container` mode here, so they fail non-blocking on engine-less runners
          # until the fleet provides distro-image runners for native draw-in. Promote back
          # to draw-in-required (as `mode: native` on distro-labelled runners) once that lands.
          - id: ubuntu-24.04-x64
            runs_on: [self-hosted, linux, x64, podman]
            mode: container
            image: docker.io/library/ubuntu:24.04
            draw_os: ubuntu-24.04
            draw_arch: x64
          - id: ubuntu-22.04-x64
            runs_on: [self-hosted, linux, x64, podman]
            mode: container
            image: docker.io/library/ubuntu:22.04
            draw_os: ubuntu-22.04
            draw_arch: x64
          - id: debian-bookworm-x64
            runs_on: [self-hosted, linux, x64, podman]
            mode: container
            image: docker.io/library/rust:1.85-bookworm
            rust_preinstalled: "1"
            draw_os: debian-bookworm
            draw_arch: x64
          - id: rocky-9-x64
            runs_on: [self-hosted, linux, x64, podman]
            mode: container
            image: docker.io/library/rockylinux:9
            draw_os: rocky-9
            draw_arch: x64
          - id: macos-gh
            runs_on: macos-latest
            mode: native
            draw_os: macos
            draw_arch: host
          - id: windows-gh
            runs_on: windows-latest
            mode: native-windows
            draw_os: windows
            draw_arch: x64
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - name: Resolve MODE
        id: cfg
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "mode=check" >> "$GITHUB_OUTPUT"
          else
            echo "mode=check" >> "$GITHUB_OUTPUT"
          fi
          # experimental: smoke subset unless dispatch asks for full
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.pin_limit }}" ]; then
            echo "pin_limit=${{ inputs.pin_limit }}" >> "$GITHUB_OUTPUT"
          else
            echo "pin_limit=5" >> "$GITHUB_OUTPUT"
          fi
      - name: Install rustup (macOS)
        if: matrix.mode == 'native' && runner.os == 'macOS'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Install rustup (Windows)
        if: matrix.mode == 'native-windows'
        shell: pwsh
        run: |
          Invoke-WebRequest https://win.rustup.rs/x86_64 -OutFile rustup-init.exe
          .\rustup-init.exe -y
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Container experimental draw-in
        if: matrix.mode == 'container'
        env:
          MODE: ${{ steps.cfg.outputs.mode }}
          PIN_LIMIT: ${{ steps.cfg.outputs.pin_limit }}
          IMAGE: ${{ matrix.image }}
          PLATFORM: ${{ matrix.platform || '' }}
          RUST_PREINSTALLED: ${{ matrix.rust_preinstalled || '0' }}
          DRAW_IN_OS: ${{ matrix.draw_os }}
          DRAW_IN_ARCH: ${{ matrix.draw_arch }}
        run: bash scripts/draw-in-container.sh
      - name: Native experimental draw-in (Unix)
        if: matrix.mode == 'native'
        env:
          MODE: ${{ steps.cfg.outputs.mode }}
          PIN_LIMIT: ${{ steps.cfg.outputs.pin_limit }}
          DRAW_IN_OS: ${{ matrix.draw_os }}
          DRAW_IN_ARCH: ${{ matrix.draw_arch }}
          WORKDIR: ${{ runner.temp }}/drawin-${{ matrix.id }}
        run: bash scripts/umbrella-draw-in.sh
      - name: Native experimental draw-in (Windows bash)
        if: matrix.mode == 'native-windows'
        shell: bash
        env:
          MODE: ${{ steps.cfg.outputs.mode }}
          PIN_LIMIT: ${{ steps.cfg.outputs.pin_limit }}
          DRAW_IN_OS: windows
          DRAW_IN_ARCH: x64
          WORKDIR: ${{ runner.temp }}/drawin-win
        run: bash scripts/umbrella-draw-in.sh

  required-gate:
    name: required OS/arch draw-in gate
    needs: [draw-in-required]
    if: always()
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - name: All required matrix cells must be success
        run: |
          set -euo pipefail
          # needs.draw-in-required.result is success only if all matrix legs succeeded
          echo "draw-in-required result=${{ needs.draw-in-required.result }}"
          test "${{ needs.draw-in-required.result }}" = "success"
