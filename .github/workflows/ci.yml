name: ci

# Umbrella product CI — not a local crate. Validates the lock and simulates a
# full user/developer install of every Rust pin (draw-in).
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Gate depth"
        type: choice
        options: [check, check+test, test]
        default: check+test
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly full draw-in (Sunday 06:17 UTC)
    - cron: "17 6 * * 0"

concurrency:
  group: ci-umbrella-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lock-format:
    name: components.lock format (Rust train)
    runs-on: [self-hosted, linux, x64, podman]
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Verify lock format (Rust-only umbrella)
        run: |
          set -euo pipefail
          rust_pins=$(grep -cE '^[a-z0-9-]+=[0-9a-f]{40} tree=[0-9a-f]{40}$' components.lock || true)
          myc_pins=$(grep -cE '^[a-z0-9-]+-myc=[0-9a-f]{40}$' components.lock || true)
          echo "rust_pins=$rust_pins myc_pins=$myc_pins"
          test "$rust_pins" -eq 45
          test "$myc_pins" -eq 0

  draw-in:
    name: full pin draw-in (${{ github.event_name == 'pull_request' && 'check' || 'check+test' }})
    needs: lock-format
    runs-on: [self-hosted, linux, x64, podman]
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Draw-in all Rust pins (install simulation)
        env:
          # PRs: check-only (faster). main / schedule / dispatch: check+test by default.
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || (github.event_name == 'pull_request' && 'check' || 'check+test') }}
          FAIL_FAST: "1"
          WORKDIR: ${{ runner.temp }}/mycelium-drawin
        run: |
          set -euo pipefail
          echo "MODE=$MODE"
          bash scripts/umbrella-draw-in.sh
